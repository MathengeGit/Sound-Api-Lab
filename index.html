<!DOCTYPE html>
<html>
    <head>
        <title>Custom Audio Player</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h2>Custom Audio Controller</h2>

        <audio id="audioPlayer">
            <source src="audio.mp3" type="audio/mpeg">
        </audio>

        <div class="controls">
            <button onclick="playAudio()">Play</button>
            <button onclick="pauseAudio()">Pause</button>
            <button onclick="skipBackward()">⏪ Back 5s</button>
            <button onclick="skipForward()">Forward 5s ⏩</button>
            <button onclick="muteAudio()">Mute / Unmute</button>
        </div>

        <br>

        <label>Volume:</label>
        <input type="range"
               min="0"
               max="1"
               step="0.1"
               value="1"
               onchange="changeVolume(this.value)">

        <br><br>

        <label>Playback Progress:</label>

        <input type="range"
            id="progressBar"
            value="0"
            min="0"
            max="100"
            step="1">

        <script src="script.js"></script>

    </body>
</html>
